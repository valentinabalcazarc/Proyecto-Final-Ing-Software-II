version: "3.9"

# =============================================================
# PiedraAzul – Microservicios
# =============================================================

services:

  # ──────────────────────────────────────
  # PostgreSQL
  # ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: piedraazul-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: piedraAzul
      POSTGRES_PASSWORD: PiedraAzul_DB#2026
      POSTGRES_DB: auth_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    ports:
      - "5432:5432"
    networks:
      - piedraazul-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U piedraAzul -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────
  # RabbitMQ
  # ──────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: piedraazul-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - piedraazul-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ──────────────────────────────────────
  # AUTH SERVICE
  # ──────────────────────────────────────
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: piedraazul-auth
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_db
      SPRING_DATASOURCE_USERNAME: piedraAzul
      SPRING_DATASOURCE_PASSWORD: PiedraAzul_DB#2026
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      JWT_SECRET: p13dr4AzUl$3cR3t#K3y!2024@M1cr0S3rv1c10s$P13dR4#AzUl!
      JWT_EXPIRATION: 86400000
      TZ: America/Bogota
      # Exponer actuator sin necesidad de agregarlo al pom
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: always
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - piedraazul-net
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8081/piedraAzul/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ──────────────────────────────────────
  # PEOPLE SERVICE
  # ──────────────────────────────────────
  people-service:
    build:
      context: ./people-service
      dockerfile: Dockerfile
    container_name: piedraazul-people
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/people_db
      SPRING_DATASOURCE_USERNAME: piedraAzul
      SPRING_DATASOURCE_PASSWORD: PiedraAzul_DB#2026
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: always
      TZ: America/Bogota
    ports:
      - "8082:8082"
    depends_on:
      auth-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - piedraazul-net
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8082/piedraAzul/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ──────────────────────────────────────
  # APPOINTMENT SERVICE
  # ──────────────────────────────────────
  appointment-service:
    build:
      context: ./appointment-service
      dockerfile: Dockerfile
    container_name: piedraazul-appointment
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/appointment_db
      SPRING_DATASOURCE_USERNAME: piedraAzul
      SPRING_DATASOURCE_PASSWORD: PiedraAzul_DB#2026
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: always
      TZ: America/Bogota
    ports:
      - "8083:8083"
    depends_on:
      people-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - piedraazul-net
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8083/piedraAzul/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ──────────────────────────────────────
  # API GATEWAY
  # ──────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: piedraazul-gateway
    restart: unless-stopped
    environment:
      JWT_SECRET: p13dr4AzUl$3cR3t#K3y!2024@M1cr0S3rv1c10s$P13dR4#AzUl!
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info
      TZ: America/Bogota
    ports:
      - "8080:8080"
    depends_on:
      appointment-service:
        condition: service_healthy
    networks:
      - piedraazul-net
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

# ──────────────────────────────────────
# Volúmenes persistentes
# ──────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  rabbitmq_data:
    driver: local

# ──────────────────────────────────────
# Red interna
# ──────────────────────────────────────
networks:
  piedraazul-net:
    driver: bridge