spring.application.name=api-gateway
server.port=8080

# Auth Service  →  piedraazul-auth:8081
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://piedraazul-auth:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/piedraAzul/auth/**

# People Service  →  piedraazul-people:8082
spring.cloud.gateway.routes[1].id=people-service
spring.cloud.gateway.routes[1].uri=http://piedraazul-people:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/piedraAzul/patients/**,/piedraAzul/professionals/**

# People Service - Unavailable Days  →  piedraazul-people:8082
spring.cloud.gateway.routes[2].id=unavailable-days
spring.cloud.gateway.routes[2].uri=http://piedraazul-people:8082
spring.cloud.gateway.routes[2].predicates[0]=Path=/piedraAzul/unavailable-days/**

# Appointment Service  →  piedraazul-appointment:8083
spring.cloud.gateway.routes[3].id=appointment-service
spring.cloud.gateway.routes[3].uri=http://piedraazul-appointment:8083
spring.cloud.gateway.routes[3].predicates[0]=Path=/piedraAzul/appointments/**

